version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: supportbydv-db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    container_name: supportbydv-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build: 
      context: ./backend
    container_name: supportbydv-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: 
      context: ./frontend
    container_name: supportbydv-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443" # Ready for SSL later
    depends_on:
      - backend

volumes:
  postgres_data: